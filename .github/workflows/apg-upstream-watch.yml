name: APG Upstream Watch

on:
  schedule:
    # 毎日 UTC 23:17 = JST 08:17. 上流の更新頻度 (月 1-3 件/パターン) に対して
    # 日次は十分に密で、業務開始前に Issue を見られる時刻。
    - cron: '17 23 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '副作用を出さずに実行内容を表示するか'
        type: boolean
        default: false
      since_override:
        description: 'state 無視で全 slug に適用する ISO8601 since (初回 backfill 用)'
        type: string
        required: false
      patterns:
        description: '対象 patternId をカンマ区切りで指定 (省略時は全件)'
        type: string
        required: false

permissions:
  contents: write
  issues: write

concurrency:
  group: apg-upstream-watch
  # 同時実行は重複 Issue や state push 競合の原因なので待機させる
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - name: Run watcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
          SINCE_OVERRIDE: ${{ inputs.since_override }}
          PATTERNS_FILTER: ${{ inputs.patterns }}
        run: npx tsx scripts/watch-apg-upstream.ts
      - name: Commit state changes
        if: ${{ inputs.dry_run != true }}
        run: |
          if git diff --quiet .github/apg-state.json; then
            echo "no state change"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/apg-state.json
          # GITHUB_TOKEN 由来の push は通常 workflow を再トリガーしないので
          # [skip ci] は保険程度の付与。
          git commit -m "chore: update apg-state [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
