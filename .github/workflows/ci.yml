name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default minimal permissions for all jobs
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Tokyo'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Cache Astro build
        uses: actions/cache@v5
        with:
          path: |
            .astro
            node_modules/.vite
          key: astro-${{ runner.os }}-${{ hashFiles('astro.config.mjs', 'scripts/deploy-target.mjs', 'package-lock.json') }}
          restore-keys: |
            astro-${{ runner.os }}-

      - name: Build site
        run: npm run build
        env:
          NODE_ENV: production
          DEPLOY_TARGET: github-pages

      # Only upload Pages artifact on main branch (for deploy)
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

      # Cache dist for E2E tests (all branches)
      - name: Cache dist for E2E tests
        uses: actions/cache/save@v5
        with:
          path: ./dist
          key: dist-${{ github.sha }}

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Check formatting
        run: npm run format:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Lint
        run: npm run lint

  test-unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [react, vue, svelte, astro]
        include:
          - framework: react
            script: npm run test:react
          - framework: vue
            script: npm run test:vue
          - framework: svelte
            script: npm run test:svelte
          - framework: astro
            script: npm run test:astro
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run ${{ matrix.framework }} unit tests
        run: ${{ matrix.script }}

  # Summary job for branch protection rules
  test:
    runs-on: ubuntu-latest
    needs: test-unit
    if: always()
    steps:
      - name: Check unit test results
        run: |
          if [[ "${{ needs.test-unit.result }}" == "success" ]]; then
            echo "All unit tests passed!"
            exit 0
          else
            echo "Unit tests failed: ${{ needs.test-unit.result }}"
            exit 1
          fi

  # Setup Playwright browsers once, cache for E2E jobs
  setup-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Pinned to Node 22 (rest of CI uses Node 24): on Node 24, `playwright install`
      # (Playwright 1.59.1) hangs indefinitely after the browser download completes,
      # during the extraction/post-processing phase. Node 22 installs the same browser
      # binary in ~1 min. The e2e jobs still run on Node 24 against the cached binary.
      # Revisit once a Playwright release fixes Node 24 install compatibility.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      # Key the browser cache on the Playwright version, not the full lockfile hash,
      # so unrelated dependency changes don't bust the cache and force a re-download.
      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      # Only the browser binary is cached here; OS deps are installed in the e2e jobs
      # via `playwright install-deps`, so `--with-deps` is intentionally omitted.
      # Each attempt is bounded by `timeout` and retried so a stalled install
      # fails fast and recovers instead of hanging the job for hours.
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 12
        run: |
          for attempt in 1 2 3; do
            if timeout 300 npx playwright install chromium; then
              exit 0
            fi
            echo "::warning::playwright install chromium attempt ${attempt} failed or timed out; retrying..."
            sleep 15
          done
          echo "::error::playwright install chromium failed after 3 attempts"
          exit 1

  test-e2e-framework:
    runs-on: ubuntu-latest
    needs: [build, setup-playwright]
    strategy:
      fail-fast: false
      matrix:
        framework: [react, vue, svelte, astro]
    env:
      # Must match build job's DEPLOY_TARGET for astro preview to use correct base path
      DEPLOY_TARGET: github-pages
      E2E_FRAMEWORK: ${{ matrix.framework }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Restore dist from cache
        uses: actions/cache/restore@v5
        with:
          path: ./dist
          key: dist-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Restore Playwright browsers from cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
          fail-on-cache-miss: true

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Run E2E tests (${{ matrix.framework }})
        run: npm run test:e2e:ci

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.framework }}
          path: playwright-report/
          retention-days: 30

  # Summary job for branch protection rules
  test-e2e:
    runs-on: ubuntu-latest
    needs: test-e2e-framework
    if: always()
    steps:
      - name: Check E2E test results
        run: |
          if [[ "${{ needs.test-e2e-framework.result }}" == "success" ]]; then
            echo "All E2E tests passed!"
            exit 0
          else
            echo "E2E tests failed: ${{ needs.test-e2e-framework.result }}"
            exit 1
          fi

  validate-html:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Restore dist from cache
        uses: actions/cache/restore@v5
        with:
          path: ./dist
          key: dist-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Validate HTML
        run: npm run validate:html

  deploy:
    runs-on: ubuntu-latest
    needs: [build, format, lint, test, test-e2e, validate-html]
    if: github.ref == 'refs/heads/main'
    # Elevated permissions only for deploy job
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
